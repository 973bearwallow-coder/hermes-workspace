<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator</title>
<style>
  :root {
    --bg: #0d0d12;
    --card: #1e1e2a;
    --border: #2d2d3f;
    --fg: #f0f0f5;
    --fg-muted: #8b8b9c;
    --accent: #00d4aa;
    --accent-dim: rgba(0, 212, 170, 0.15);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
    max-width: 380px;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 22px;
    font-weight: 600;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: var(--fg-muted);
    margin-bottom: 6px;
  }
  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 1rem;
    outline: none;
  }
  input[type="number"]:focus {
    border-color: var(--accent);
  }
  .field { margin-bottom: 18px; }
  .tip-btns {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .tip-btns button {
    flex: 1;
    background: var(--accent-dim);
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: var(--radius-sm);
    padding: 10px 0;
    font-size: 0.95rem;
    cursor: pointer;
    transition: 0.15s ease;
  }
  .tip-btns button:hover,
  .tip-btns button.active {
    background: var(--accent);
    color: #04140f;
    border-color: var(--accent);
    font-weight: 600;
  }
  .results {
    margin-top: 24px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }
  .result-row:last-child { margin-bottom: 0; }
  .result-label {
    color: var(--fg-muted);
    font-size: 0.9rem;
  }
  .result-value {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--accent);
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Tip Calculator</h1>

    <div class="field">
      <label for="bill">Bill Amount</label>
      <input type="number" id="bill" min="0" step="0.01" placeholder="0.00">
    </div>

    <div class="field">
      <label for="tip">Tip Percentage</label>
      <input type="number" id="tip" min="0" step="1" placeholder="15">
      <div class="tip-btns">
        <button data-tip="15">15%</button>
        <button data-tip="18">18%</button>
        <button data-tip="20">20%</button>
      </div>
    </div>

    <div class="field">
      <label for="people">Number of People</label>
      <input type="number" id="people" min="1" step="1" value="1">
    </div>

    <div class="results">
      <div class="result-row">
        <span class="result-label">Total Tip</span>
        <span class="result-value" id="totalTip">$0.00</span>
      </div>
      <div class="result-row">
        <span class="result-label">Per Person</span>
        <span class="result-value" id="perPerson">$0.00</span>
      </div>
    </div>
  </div>

<script>
  const billEl = document.getElementById('bill');
  const tipEl = document.getElementById('tip');
  const peopleEl = document.getElementById('people');
  const totalTipEl = document.getElementById('totalTip');
  const perPersonEl = document.getElementById('perPerson');
  const tipBtns = document.querySelectorAll('.tip-btns button');

  function formatMoney(n) {
    return '$' + n.toFixed(2);
  }

  function calculate() {
    const bill = parseFloat(billEl.value) || 0;
    const tip = parseFloat(tipEl.value) || 0;
    const people = parseInt(peopleEl.value) || 1;

    const totalTip = bill * (tip / 100);
    const perPerson = (bill + totalTip) / (people > 0 ? people : 1);

    totalTipEl.textContent = formatMoney(totalTip);
    perPersonEl.textContent = formatMoney(perPerson);
  }

  [billEl, tipEl, peopleEl].forEach(el => {
    el.addEventListener('input', calculate);
  });

  tipBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tipBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      tipEl.value = btn.dataset.tip;
      calculate();
    });
  });

  calculate();
</script>
</body>
</html>
